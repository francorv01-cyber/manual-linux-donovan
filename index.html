<h1>Manual de Comandos Linux</h1>

<h2>SORT</h2>
<p>Ordena líneas de texto.</p>
<h3>Opciones</h3>
<ul>
    <li>-r</li>
    <li>-n</li>
    <li>-k</li>
</ul>
<h3>Ejemplos</h3>
<pre>
sort archivo.txt
sort -r archivo.txt
sort -n numeros.txt
sort -k 2 archivo.txt
</pre>
